<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa ANM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Segoe UI", sans-serif;
  background:#0f0f1a;
  color:#fff;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#header {
  background:#1a1a2e;
  padding:10px 16px;
  border-bottom:2px solid #2a2a4a;
  display:flex;
  gap:12px;
  align-items:center;
}

#header h1 { font-size:14px; }
#header span { color:#FF4500; }

.badge {
  padding:3px 10px;
  border-radius:20px;
  font-size:11px;
}

#map-wrap { position:relative; flex:1; }
#map { width:100%; height:100%; }

#layer-control {
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(20,20,40,0.9);
  padding:10px;
  border-radius:8px;
  font-size:12px;
}

.layer-item {
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:6px;
}

.color {
  width:12px;
  height:12px;
  border-radius:2px;
}
</style>
</head>

<body>

<div id="header">
  <h1>⛏️ ANM — <span id="proc"></span></h1>
  <div class="badge" id="status"></div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="layer-control"></div>
</div>

<script>

// ===== PARAMETROS =====
const params = new URLSearchParams(window.location.search);

const processo = params.get("processo") || "N/D";
const coords = JSON.parse(decodeURIComponent(params.get("coords") || "[]"));
const sobreposicao = params.get("sobreposicao") === "1";
const restritas = JSON.parse(decodeURIComponent(params.get("restritas") || "[]"));

// ===== HEADER =====
document.getElementById("proc").innerText = processo;

const status = document.getElementById("status");

if (sobreposicao){
  status.innerText = "⚠️ Sobreposição";
  status.style.background = "#FF6D00";
}else{
  status.innerText = "✅ Sem sobreposição";
  status.style.background = "#00C853";
}

// ===== MAPA =====
const map = L.map("map");

// BASE SEMPRE NO FUNDO
L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { maxZoom: 19, zIndex: 100 }
).addTo(map);

// CRIA PANE PARA CAMADAS
map.createPane('camadas');
map.getPane('camadas').style.zIndex = 650;

// ===== PROCESSO =====
let processoLayer = null;

if (coords.length > 0){
  processoLayer = L.polygon(coords.map(c => [c[1], c[0]]), {
    pane: 'camadas',
    color:"#FF4500",
    weight:2,
    fillOpacity:0.3
  }).addTo(map);

  processoLayer.bringToFront();

  map.fitBounds(processoLayer.getBounds(), {padding:[20,20]});
}else{
  map.setView([0,0], 2);
}

// ===== UC / TI =====
let ucLayer = null;
let tiLayer = null;

if (restritas.length > 0){

  const ucs = restritas.filter(r => r.tipo === "UC");
  const tis = restritas.filter(r => r.tipo === "TI");

  if (ucs.length > 0){
    ucLayer = L.layerGroup(
      ucs.map(r =>
        L.polygon(r.coords.map(c => [c[1], c[0]]), {
          pane:'camadas',
          color:"#00C853",
          weight:2,
          fillOpacity:0.25
        }).bindPopup(`<b>UC:</b> ${r.nome}`)
      )
    ).addTo(map);

    ucLayer.bringToFront();
  }

  if (tis.length > 0){
    tiLayer = L.layerGroup(
      tis.map(r =>
        L.polygon(r.coords.map(c => [c[1], c[0]]), {
          pane:'camadas',
          color:"#FF6D00",
          weight:2,
          fillOpacity:0.25
        }).bindPopup(`<b>TI:</b> ${r.nome}`)
      )
    ).addTo(map);

    tiLayer.bringToFront();
  }
}

// ===== CONTROLE =====
const control = document.getElementById("layer-control");

let html = `
<div class="layer-item">
  <input type="checkbox" id="chk_proc" checked>
  <div class="color" style="background:#FF4500"></div>
  Processo
</div>
`;

if (ucLayer){
  html += `
  <div class="layer-item">
    <input type="checkbox" id="chk_uc" checked>
    <div class="color" style="background:#00C853"></div>
    UC
  </div>
  `;
}

if (tiLayer){
  html += `
  <div class="layer-item">
    <input type="checkbox" id="chk_ti" checked>
    <div class="color" style="background:#FF6D00"></div>
    TI
  </div>
  `;
}

control.innerHTML = html;

// ===== EVENTOS =====
document.getElementById("chk_proc")?.addEventListener("change", e => {
  if (processoLayer){
    e.target.checked ? map.addLayer(processoLayer) : map.removeLayer(processoLayer);
  }
});

document.getElementById("chk_uc")?.addEventListener("change", e => {
  if (!ucLayer) return;
  e.target.checked ? map.addLayer(ucLayer) : map.removeLayer(ucLayer);
});

document.getElementById("chk_ti")?.addEventListener("change", e => {
  if (!tiLayer) return;
  e.target.checked ? map.addLayer(tiLayer) : map.removeLayer(tiLayer);
});

</script>

</body>
</html>
