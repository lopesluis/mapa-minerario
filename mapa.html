<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa ANM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;          /* FIX: sem isso Leaflet fica cego */
    font-family: "Segoe UI", sans-serif;
    background: #0f0f1a;
    color: #fff;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── cabeçalho ── */
  #header {
    flex-shrink: 0;
    background: #1a1a2e;
    padding: 9px 14px;
    border-bottom: 2px solid #2a2a4a;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  #header h1 { font-size: 14px; }
  #header h1 span { color: #FF4500; }

  .badge {
    padding: 3px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid currentColor;
  }

  /* ── info bar ── */
  #info {
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
    padding: 6px 14px;
    background: #12122a;
    border-bottom: 1px solid #2a2a4a;
    font-size: 11px;
    color: #aaa;
  }
  #info strong { color: #fff; }

  /* ── mapa: ocupa TODO o espaço restante ── */
  #map {
    flex: 1 1 0;           /* FIX: não use height:100% em filho flex */
    min-height: 0;         /* FIX: necessário para flex shrink funcionar */
    width: 100%;
  }

  /* ── painel de controle ── */
  #ctrl {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: rgba(15,15,30,0.92);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 13px;
    font-size: 12px;
    min-width: 160px;
    pointer-events: all;
  }
  #ctrl h3 {
    color: #aaa;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 7px;
  }
  #ctrl hr { border-color: #333; margin: 7px 0; }
  .ci { display:flex; align-items:center; gap:7px; margin-bottom:5px; cursor:pointer; color:#ddd; }
  .ci input { cursor:pointer; accent-color:#FF4500; }
  .dot { width:11px; height:11px; border-radius:2px; flex-shrink:0; border:1px solid #fff3; }

  /* ── legenda ── */
  #legend {
    position: absolute;
    bottom: 28px;
    left: 10px;
    z-index: 1000;
    background: rgba(15,15,30,0.92);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 11px;
  }
  #legend h3 { color:#aaa; font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .li { display:flex; align-items:center; gap:7px; margin-bottom:4px; color:#ddd; }
  .lb { width:14px; height:10px; border-radius:2px; border:1px solid #fff4; }

  /* o mapa precisa de posição relativa para os controles absolute ficarem dentro */
  #map-wrap { position:relative; flex:1 1 0; min-height:0; display:flex; flex-direction:column; }
</style>
</head>
<body>

<!-- cabeçalho -->
<div id="header">
  <h1>⛏️ ANM — <span id="hd-proc">…</span></h1>
  <div class="badge" id="hd-badge"></div>
</div>

<!-- barra de info -->
<div id="info" id="info-bar"></div>

<!-- mapa -->
<div id="map-wrap">
  <div id="map"></div>
  <div id="ctrl"></div>
  <div id="legend">
    <h3>Legenda</h3>
    <div class="li"><div class="lb" style="background:#FF450088;border-color:#FF4500"></div> Processo</div>
    <div class="li" id="leg-uc" style="display:none"><div class="lb" style="background:#00C85388;border-color:#00C853"></div> Unidade de Conservação</div>
    <div class="li" id="leg-ti" style="display:none"><div class="lb" style="background:#FF6D0088;border-color:#FF6D00"></div> Terra Indígena</div>
  </div>
</div>

<script>
// ── Lê parâmetros da URL ────────────────────────────────────────────────────
const P = new URLSearchParams(location.search);

const processo   = P.get("processo") || "N/D";
const sobFlag    = P.get("sobreposicao") === "1";

let coords, restritas;
try { coords    = JSON.parse(decodeURIComponent(P.get("coords")    || "[]")); } catch(e){ coords = []; }
try { restritas = JSON.parse(decodeURIComponent(P.get("restritas") || "[]")); } catch(e){ restritas = []; }

// ── Cabeçalho ────────────────────────────────────────────────────────────────
document.getElementById("hd-proc").textContent = processo;

const badge = document.getElementById("hd-badge");
if (sobFlag) {
  badge.textContent = "⚠️ Sobreposição detectada";
  badge.style.color = "#FF6D00";
} else {
  badge.textContent = "✅ Sem sobreposição";
  badge.style.color = "#00C853";
}

// ── Info bar ─────────────────────────────────────────────────────────────────
// (dados extras podem ser adicionados aqui via parâmetros extras na URL)

// ── Inicializa Leaflet ───────────────────────────────────────────────────────
// IMPORTANTE: o div #map precisa ter dimensão real neste momento.
// Garantido pelo flex layout acima (html/body height:100%, #map flex:1).

const map = L.map("map", { zoomControl: true, attributionControl: true });

// ── Camadas base ─────────────────────────────────────────────────────────────
// ESRI WorldImagery — URL sem chave, funciona em GitHub Pages
const esriLayer = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: "Tiles © Esri — Source: Esri, DigitalGlobe, GeoEye, Earthstar Geographics", maxZoom: 19 }
);

// OSM — fallback
const osmLayer = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution: "© OpenStreetMap contributors", maxZoom: 19 }
);

// Tenta ESRI; se a primeira tile falhar, troca automaticamente para OSM
esriLayer.addTo(map);
let esriFailed = false;
esriLayer.on("tileerror", () => {
  if (!esriFailed) {
    esriFailed = true;
    map.removeLayer(esriLayer);
    osmLayer.addTo(map);
    document.querySelector('input[value="esri"]').checked = false;
    document.querySelector('input[value="osm"]').checked  = true;
  }
});

// ── Pane para overlays ficarem acima das tiles ───────────────────────────────
map.createPane("overlays");
map.getPane("overlays").style.zIndex = 650;

// ── Camada do processo ───────────────────────────────────────────────────────
let procLayer = null;

if (coords.length >= 3) {
  // coords = [[lng, lat], ...] → Leaflet usa [lat, lng]
  const latlngs = coords.map(c => [c[1], c[0]]);

  procLayer = L.polygon(latlngs, {
    pane: "overlays",
    color: "#FF4500",
    weight: 2.5,
    fillColor: "#FF4500",
    fillOpacity: 0.30,
  }).addTo(map);

  procLayer.bindPopup(`<b>⛏️ Processo ${processo}</b>`);
  map.fitBounds(procLayer.getBounds(), { padding: [30, 30] });
} else {
  map.setView([-14, -52], 4); // Brasil
}

// ── Camadas de áreas restritas ───────────────────────────────────────────────
let ucGroup = null;
let tiGroup = null;

const ucs = restritas.filter(r => r.tipo === "UC");
const tis = restritas.filter(r => r.tipo === "TI");

if (ucs.length > 0) {
  ucGroup = L.layerGroup(
    ucs.map(r => L.polygon(r.coords.map(c => [c[1], c[0]]), {
      pane: "overlays",
      color: "#00C853", weight: 2,
      fillColor: "#00C853", fillOpacity: 0.25,
    }).bindPopup(`<b>🌿 UC</b><br>${r.nome}`))
  ).addTo(map);
  document.getElementById("leg-uc").style.display = "flex";
}

if (tis.length > 0) {
  tiGroup = L.layerGroup(
    tis.map(r => L.polygon(r.coords.map(c => [c[1], c[0]]), {
      pane: "overlays",
      color: "#FF6D00", weight: 2,
      fillColor: "#FF6D00", fillOpacity: 0.25,
    }).bindPopup(`<b>🔶 TI</b><br>${r.nome}`))
  ).addTo(map);
  document.getElementById("leg-ti").style.display = "flex";
}

// ── Controle de camadas ──────────────────────────────────────────────────────
const ctrl = document.getElementById("ctrl");
ctrl.innerHTML = `
  <h3>Camada base</h3>
  <label class="ci"><input type="radio" name="base" value="esri" checked> ESRI Satélite</label>
  <label class="ci"><input type="radio" name="base" value="osm"> OpenStreetMap</label>
  <hr>
  <h3>Overlays</h3>
  <label class="ci">
    <input type="checkbox" id="chk-proc" checked>
    <span class="dot" style="background:#FF4500"></span> Processo
  </label>
  ${ucGroup ? `<label class="ci"><input type="checkbox" id="chk-uc" checked><span class="dot" style="background:#00C853"></span> UCs</label>` : ""}
  ${tiGroup ? `<label class="ci"><input type="checkbox" id="chk-ti" checked><span class="dot" style="background:#FF6D00"></span> TIs</label>` : ""}
`;

// radio base map
document.querySelectorAll('input[name="base"]').forEach(r => {
  r.addEventListener("change", () => {
    if (r.value === "esri") {
      map.removeLayer(osmLayer);
      map.addLayer(esriLayer);
    } else {
      map.removeLayer(esriLayer);
      map.addLayer(osmLayer);
    }
  });
});

// checkboxes overlay
document.getElementById("chk-proc")?.addEventListener("change", e => {
  if (!procLayer) return;
  e.target.checked ? map.addLayer(procLayer) : map.removeLayer(procLayer);
});
document.getElementById("chk-uc")?.addEventListener("change", e => {
  if (!ucGroup) return;
  e.target.checked ? map.addLayer(ucGroup) : map.removeLayer(ucGroup);
});
document.getElementById("chk-ti")?.addEventListener("change", e => {
  if (!tiGroup) return;
  e.target.checked ? map.addLayer(tiGroup) : map.removeLayer(tiGroup);
});

// ── Forçar resize após render ────────────────────────────────────────────────
// Garante que Leaflet "veja" o tamanho real do container
setTimeout(() => map.invalidateSize(), 100);
</script>
</body>
</html>
